# ---------------------------------------------------------------------------
# AI tools declaration (transparency only - not penalized)
# ---------------------------------------------------------------------------
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Claude was used as a pair-programming assistant for code review, architectural
  discussion, regex drafting, and writing documentation. All design decisions
  (the rubric weights, disqualifier gates, behavioral multiplier, and honeypot
  checks) were made and verified by the team against the JD and the data. No
  candidate data was sent to any hosted LLM, and the ranking step itself makes
  no LLM/API calls (CPU-only, no network).

# ---------------------------------------------------------------------------
methodology_summary: |
  Hybrid ranker = semantic similarity over career *prose* (TF-IDF cosine to a
  JD concept-query, deliberately not the skills tags) blended 45/55 with a
  structured rubric (role-fit, domain evidence, production, evaluation literacy,
  trust-weighted skills, experience). The blended base is then multiplied by:
  (1) disqualifier gates encoding the JD's explicit "do NOT want" list
  (pure-research/no-prod, consulting-only careers, CV/speech-only, LangChain-only,
  lead-without-coding, title-chasers); (2) a behavioral availability multiplier
  (activity recency, recruiter response rate, open-to-work, notice period) so
  perfect-on-paper-but-unreachable candidates are down-weighted; (3) a location
  factor (India Tier-1 / relocation); and (4) a honeypot sink that zeroes
  internally-inconsistent profiles (impossible tenure, ghost "expert" skills).
  Stdlib-only, ~2 min on CPU for 100K candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
